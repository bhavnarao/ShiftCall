services:
  - type: web
    name: shiftcall-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Set these in the Render dashboard (don't commit secrets):
      #   XAI_API_KEY        - fallback xAI Grok key (per-user keys override)
      #   XAI_MODEL          - optional, defaults to grok-2-latest
      #   VAPI_TRIAL_PUBLIC_KEY - public key used for free-trial calls
      #   DEEPGRAM_TRIAL_KEY    - master Deepgram key, used to mint short-lived
      #                            scoped tokens for trial sessions
      #   PINECONE_API_KEY   - optional, app degrades gracefully without it
      #   MISTRAL_API_KEY    - optional
      #   OPENAI_API_KEY     - optional
      #   CORS_ORIGINS       - comma-separated frontend URLs, e.g.
      #                        "https://shiftcall.vercel.app,https://shiftcall-git-main-you.vercel.app"
