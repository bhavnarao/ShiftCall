services:
  - type: web
    name: shiftcall-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Set these in the Render dashboard (don't commit secrets):
      #   ANTHROPIC_API_KEY  - fallback Claude key (per-user keys override)
      #   PINECONE_API_KEY   - optional, app degrades gracefully without it
      #   MISTRAL_API_KEY    - optional
      #   OPENAI_API_KEY     - optional
      #   CORS_ORIGINS       - comma-separated frontend URLs, e.g.
      #                        "https://shiftcall.vercel.app,https://shiftcall-git-main-you.vercel.app"
